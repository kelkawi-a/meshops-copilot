trino:
  url: http://localhost:8080
  user: meshops
  password: ""          # set for password-protected clusters
  verify_ssl: true      # set false for self-signed TLS certificates
  timeout: 180

superset:
  url: http://localhost:8088
  user: admin
  password: admin

grafana:
  url: http://localhost:3000
  token: ""

datahub:
  gms_url: http://localhost:8080
  token: ""

prometheus:
  url: http://localhost:9090

llm:
  provider: none   # openai | anthropic | none
  model: gpt-4o
  api_key: ""      # or use OPENAI_API_KEY / ANTHROPIC_API_KEY env vars

output:
  dir: ./reports
  log_level: INFO
